[pytest]
# Configuração mínima do pytest para o projeto MedWatch.
#
# Os testes em tests/ cobrem a lógica determinística principal de cada
# módulo (Etapas 1-5), com chamadas a Whisper e Groq API sempre mockadas
# — a suíte completa roda em poucos segundos, sem custo de API nem
# dependência de rede. Ver Seção 16 do relatório técnico para o comando
# de execução (uv run pytest).
testpaths = tests
python_files = test_*.py
python_functions = test_*
addopts = -v